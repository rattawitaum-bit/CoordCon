<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoordConverter - แปลงพิกัด</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f59e0b', // Amber-500
                        background: '#0f172a', // Slate-900
                        card: '#1e293b', // Slate-800
                        border: '#334155' // Slate-700
                    }
                }
            }
        }
    </script>

    <!-- Leaflet Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Proj4js สำหรับแปลงพิกัด -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Styles */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .grid-bg {
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark body { background-color: #0f172a; color: #f8fafc; }
        .light body { background-color: #f8fafc; color: #0f172a; }
        .light .grid-bg {
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
        .light .bg-card { background-color: #ffffff; border-color: #e2e8f0; }
        .light .border-border { border-color: #e2e8f0; }
        .light input, .light select { background-color: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }
        
        input, select { outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #f59e0b; }
        
        .dark #map { filter: brightness(0.9) contrast(1.1); }
    </style>
</head>
<body class="grid-bg min-h-screen flex flex-col transition-colors duration-200">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-slate-900/90 dark:bg-slate-900/90 light:bg-white/90 backdrop-blur-sm border-b border-border transition-colors">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded bg-amber-500/20 border border-amber-500/50 flex items-center justify-center">
                    <i data-lucide="crosshair" class="w-4 h-4 text-amber-500"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold leading-none">CoordConverter</h1>
                    <p class="text-[10px] text-slate-400 mt-0.5">WGS84 ↔ Local Datum</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="getGPS()" class="p-2 text-slate-400 hover:text-amber-500 transition-colors" title="GPS">
                    <i data-lucide="navigation" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleTheme()" class="p-2 text-slate-400 hover:text-amber-500 transition-colors" title="สลับธีม">
                    <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-lg mx-auto w-full px-4 py-6 space-y-4">

        <!-- Datum Selector -->
        <section class="bg-card border border-border rounded-xl p-4 shadow-sm">
            <label class="flex items-center gap-1.5 text-xs font-semibold text-slate-400 uppercase mb-2">
                <i data-lucide="globe" class="w-3.5 h-3.5 text-amber-500"></i> Local Datum / ระบบพิกัด
            </label>
            <select id="datumSelect" class="w-full bg-slate-800 text-sm border border-border rounded-lg px-3 py-2 text-white">
                <option value="indian1975">Indian 1975 (Thailand) - EPSG:4240</option>
                <option value="indian1975_utm47">Indian 1975 UTM 47N - EPSG:24047</option>
                <option value="indian1975_utm48">Indian 1975 UTM 48N - EPSG:24048</option>
                <option value="wgs84_utm_auto" selected>WGS84 UTM (Auto Zone)</option>
                <option value="nad83">NAD83 (North America) - EPSG:4269</option>
                <option value="etrs89">ETRS89 (Europe) - EPSG:4258</option>
            </select>
        </section>

        <!-- Direction & Input Mode -->
        <div class="flex gap-2">
            <button onclick="swapDirection()" class="flex-1 flex items-center justify-center gap-2 bg-card border border-border rounded-lg py-2 text-xs font-semibold hover:border-amber-500 transition-colors">
                <span id="label-from" class="text-amber-500">WGS84</span>
                <i data-lucide="arrow-left-right" class="w-3 h-3"></i>
                <span id="label-to">Local</span>
            </button>
            <div class="flex bg-card border border-border rounded-lg overflow-hidden">
                <button id="btn-mode-latlon" onclick="setInputMode('latlon')" class="px-4 py-2 text-xs font-bold bg-amber-500 text-slate-900 transition-colors">Lat/Lon</button>
                <button id="btn-mode-utm" onclick="setInputMode('utm')" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-colors">UTM</button>
            </div>
        </div>

        <!-- Input Fields -->
        <section class="bg-card border border-border rounded-xl p-4 shadow-sm space-y-3">
            <div class="flex items-center justify-between border-b border-border/50 pb-3 mb-1">
                <h3 id="input-title" class="text-xs font-bold text-amber-500 uppercase flex items-center gap-1.5">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> WGS84 Input
                </h3>
                
                <!-- D, DM, DMS Toggle -->
                <div id="format-toggles" class="flex gap-1">
                    <button id="fmt-D" onclick="setFormat('D')" class="px-2 py-0.5 text-[9px] font-bold rounded bg-amber-500 text-slate-900 transition-colors">D</button>
                    <button id="fmt-DM" onclick="setFormat('DM')" class="px-2 py-0.5 text-[9px] font-bold rounded text-slate-400 hover:text-white transition-colors">D M</button>
                    <button id="fmt-DMS" onclick="setFormat('DMS')" class="px-2 py-0.5 text-[9px] font-bold rounded text-slate-400 hover:text-white transition-colors">DMS</button>
                </div>
            </div>
            
            <!-- Lat/Lon Inputs -->
            <div id="inputs-latlon" class="grid grid-cols-2 gap-3 pt-1">
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-medium">Latitude</label>
                    <input type="text" id="lat" placeholder="13.756300" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-medium">Longitude</label>
                    <input type="text" id="lon" placeholder="100.501800" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                </div>
            </div>

            <!-- UTM Inputs (Hidden by default) -->
            <div id="inputs-utm" class="hidden space-y-3 pt-1">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-medium">Easting (X)</label>
                        <input type="number" id="easting" placeholder="662500" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-medium">Northing (Y)</label>
                        <input type="number" id="northing" placeholder="1521500" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-medium">Zone (1-60)</label>
                        <input type="number" id="zone" placeholder="47" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-medium">Hemisphere</label>
                        <select id="hemi" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1 text-white">
                            <option value="N">North (N)</option>
                            <option value="S">South (S)</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- Convert Button -->
        <button onclick="convert()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3.5 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2">
            <i data-lucide="zap" class="w-4 h-4"></i> แปลงพิกัด (Convert Coordinates)
        </button>

        <!-- Map Container -->
        <div id="map-wrapper" class="hidden space-y-2 mt-2">
            <div class="flex items-center justify-between">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                    <i data-lucide="map" class="w-3.5 h-3.5 text-amber-500"></i> Map Preview
                </h3>
                <!-- Street / Satellite Toggle -->
                <div class="flex bg-slate-900 border border-border rounded-md overflow-hidden p-0.5">
                    <button id="map-street" onclick="setMapType('street')" class="px-2.5 py-1 text-[10px] font-semibold rounded-sm bg-amber-500 text-slate-900 transition-colors">
                        Street
                    </button>
                    <button id="map-satellite" onclick="setMapType('satellite')" class="px-2.5 py-1 text-[10px] font-semibold rounded-sm text-slate-400 hover:text-white bg-transparent transition-colors">
                        Satellite
                    </button>
                </div>
            </div>
            <div id="map" class="w-full h-[280px] rounded-lg border border-border relative z-0"></div>
        </div>

        <!-- Results Area -->
        <section id="results" class="hidden bg-card border border-amber-500/30 rounded-xl p-4 shadow-[0_0_20px_rgba(245,158,11,0.1)] space-y-4">
            <div class="flex items-center justify-between border-b border-border/50 pb-2">
                <h3 id="output-title" class="text-[11px] font-bold text-amber-500 uppercase flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                    Local Output
                </h3>
                <button onclick="copyAllResults()" class="text-[10px] font-medium flex items-center gap-1 text-slate-400 hover:text-white transition-colors bg-slate-900/50 px-2 py-1 rounded border border-border">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy All
                </button>
            </div>
            
            <div id="result-content" class="space-y-4 pt-1">
                <!-- Results injected via JS -->
            </div>
        </section>

    </main>

    <!-- App Logic -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        // State variables
        let isDark = true;
        let direction = 'wgs84_to_local'; 
        let inputMode = 'latlon'; 
        let coordFormat = 'D'; // 'D', 'DM', 'DMS'
        
        // Map States
        let map = null;
        let marker = null;
        let streetLayer = null;
        let satelliteLayer = null;
        let currentMapType = 'street';

        let currentResultText = "";

        // Datum Definitions
        const WGS84 = "+proj=longlat +datum=WGS84 +no_defs";
        const DATUM_DEFS = {
            'wgs84_utm_auto': 'AUTO',
            'indian1975': "+proj=longlat +a=6377276.345 +b=6356075.41314024 +towgs84=214,836,303,0,0,0,0 +no_defs",
            'indian1975_utm47': "+proj=utm +zone=47 +a=6377276.345 +b=6356075.41314024 +towgs84=214,836,303,0,0,0,0 +units=m +no_defs",
            'indian1975_utm48': "+proj=utm +zone=48 +a=6377276.345 +b=6356075.41314024 +towgs84=214,836,303,0,0,0,0 +units=m +no_defs",
            'nad83': "+proj=longlat +datum=NAD83 +no_defs",
            'etrs89': "+proj=longlat +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +no_defs"
        };

        // UI Functions
        function toggleTheme() {
            isDark = !isDark;
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (isDark) {
                html.classList.add('dark');
                html.classList.remove('light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.setAttribute('data-lucide', 'sun');
                document.querySelectorAll('input, select').forEach(el => {
                    el.classList.replace('text-white', 'text-slate-900');
                });
            }
            lucide.createIcons();
        }

        function swapDirection() {
            direction = direction === 'wgs84_to_local' ? 'local_to_wgs84' : 'wgs84_to_local';
            document.getElementById('label-from').innerText = direction === 'wgs84_to_local' ? 'WGS84' : 'Local';
            document.getElementById('label-to').innerText = direction === 'wgs84_to_local' ? 'Local' : 'WGS84';
            
            document.getElementById('input-title').innerHTML = `<i data-lucide="map-pin" class="w-3.5 h-3.5 inline"></i> ${direction === 'wgs84_to_local' ? 'WGS84 Input' : 'Local Input'}`;
            document.getElementById('output-title').innerHTML = `<div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div> ${direction === 'wgs84_to_local' ? 'Local Output' : 'WGS84 Output'}`;
            
            lucide.createIcons();
            clearResults();
        }

        function setInputMode(mode) {
            inputMode = mode;
            const btnLatLon = document.getElementById('btn-mode-latlon');
            const btnUtm = document.getElementById('btn-mode-utm');
            const formatToggles = document.getElementById('format-toggles');
            
            if (mode === 'latlon') {
                document.getElementById('inputs-latlon').classList.remove('hidden');
                document.getElementById('inputs-utm').classList.add('hidden');
                formatToggles.classList.remove('hidden');
                
                btnLatLon.className = "px-4 py-2 text-xs font-bold bg-amber-500 text-slate-900 transition-colors";
                btnUtm.className = "px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-colors bg-transparent";
            } else {
                document.getElementById('inputs-latlon').classList.add('hidden');
                document.getElementById('inputs-utm').classList.remove('hidden');
                formatToggles.classList.add('hidden');
                
                btnUtm.className = "px-4 py-2 text-xs font-bold bg-amber-500 text-slate-900 transition-colors";
                btnLatLon.className = "px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-colors bg-transparent";
            }
            clearResults();
        }

        function setFormat(fmt) {
            coordFormat = fmt;
            ['D', 'DM', 'DMS'].forEach(f => {
                const btn = document.getElementById(`fmt-${f}`);
                if (f === fmt) {
                    btn.className = "px-2 py-0.5 text-[9px] font-bold rounded bg-amber-500 text-slate-900 transition-colors";
                } else {
                    btn.className = "px-2 py-0.5 text-[9px] font-bold rounded text-slate-400 hover:text-white transition-colors bg-transparent";
                }
            });

            // Update placeholders
            const latInput = document.getElementById('lat');
            const lonInput = document.getElementById('lon');
            if (fmt === 'D') {
                latInput.placeholder = "13.756300";
                lonInput.placeholder = "100.501800";
            } else if (fmt === 'DM') {
                latInput.placeholder = "13 45.378 N";
                lonInput.placeholder = "100 30.108 E";
            } else {
                latInput.placeholder = "13 45 22.68 N";
                lonInput.placeholder = "100 30 06.48 E";
            }
        }

        function clearResults() {
            document.getElementById('results').classList.add('hidden');
            currentResultText = "";
        }

        // --- Formatting & Parsing Logic ---
        function parseCoordinate(input) {
            if (!input) return NaN;
            let str = input.toString().trim().toUpperCase();
            
            // Extract direction letter if present
            let dirMatch = str.match(/[NSEW]$/);
            let dir = dirMatch ? dirMatch[0] : '';
            
            // Remove symbols
            str = str.replace(/[NSEW°'"]/g, '').trim();
            
            // Split by space or colon
            let parts = str.split(/[\s:]+/).filter(Boolean);
            if (parts.length === 0) return NaN;

            let val = parseFloat(parts[0]);
            if (parts.length > 1) val += parseFloat(parts[1]) / 60;
            if (parts.length > 2) val += parseFloat(parts[2]) / 3600;

            if (dir === 'S' || dir === 'W') val = -val;
            return val;
        }

        function toD(dec) {
            return dec.toFixed(6);
        }

        function toDM(dec, isLat) {
            const dir = isLat ? (dec >= 0 ? 'N' : 'S') : (dec >= 0 ? 'E' : 'W');
            const abs = Math.abs(dec);
            const d = Math.floor(abs);
            const m = ((abs - d) * 60).toFixed(4);
            return `${d}° ${m}' ${dir}`;
        }

        function toDMS(dec, isLat) {
            const dir = isLat ? (dec >= 0 ? 'N' : 'S') : (dec >= 0 ? 'E' : 'W');
            const abs = Math.abs(dec);
            const d = Math.floor(abs);
            const mFloat = (abs - d) * 60;
            const m = Math.floor(mFloat);
            const s = ((mFloat - m) * 60).toFixed(2);
            return `${d}° ${m}' ${s}" ${dir}`;
        }

        function formatCoord(dec, isLat, format) {
            if (format === 'D') return toD(dec);
            if (format === 'DM') return toDM(dec, isLat);
            if (format === 'DMS') return toDMS(dec, isLat);
            return toD(dec);
        }

        // --- Map Functions ---
        function initMap(lat, lon) {
            document.getElementById('map-wrapper').classList.remove('hidden');
            
            if (!map) {
                map = L.map('map').setView([lat, lon], 12);
                
                // Initialize both layers
                streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                });
                
                satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: 'Tiles © Esri'
                });

                // Add default layer based on currentMapType
                if (currentMapType === 'street') {
                    streetLayer.addTo(map);
                } else {
                    satelliteLayer.addTo(map);
                }
                
                marker = L.marker([lat, lon]).addTo(map);
            } else {
                map.setView([lat, lon], 12);
                marker.setLatLng([lat, lon]);
            }
            
            // Fix map sizing issue when container becomes visible
            setTimeout(() => map.invalidateSize(), 100);
        }

        function setMapType(type) {
            currentMapType = type;
            const btnStreet = document.getElementById('map-street');
            const btnSatellite = document.getElementById('map-satellite');

            if (type === 'street') {
                btnStreet.className = "px-2.5 py-1 text-[10px] font-semibold rounded-sm bg-amber-500 text-slate-900 transition-colors";
                btnSatellite.className = "px-2.5 py-1 text-[10px] font-semibold rounded-sm text-slate-400 hover:text-white bg-transparent transition-colors";
                if (map) {
                    map.removeLayer(satelliteLayer);
                    streetLayer.addTo(map);
                }
            } else {
                btnSatellite.className = "px-2.5 py-1 text-[10px] font-semibold rounded-sm bg-amber-500 text-slate-900 transition-colors";
                btnStreet.className = "px-2.5 py-1 text-[10px] font-semibold rounded-sm text-slate-400 hover:text-white bg-transparent transition-colors";
                if (map) {
                    map.removeLayer(streetLayer);
                    satelliteLayer.addTo(map);
                }
            }
        }

        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    document.getElementById('lat').value = formatCoord(lat, true, coordFormat);
                    document.getElementById('lon').value = formatCoord(lon, false, coordFormat);
                    
                    if(direction !== 'wgs84_to_local') swapDirection();
                    if(inputMode !== 'latlon') setInputMode('latlon');
                    
                    initMap(lat, lon);
                    alert(`GPS Location found: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
                }, () => {
                    alert("ไม่สามารถดึงข้อมูลตำแหน่ง GPS ได้");
                });
            } else {
                alert("เบราว์เซอร์ของคุณไม่รองรับ Geolocation");
            }
        }

        // Helper Math Function for UTM
        function getUtmZone(lon) {
            return Math.floor((lon + 180) / 6) + 1;
        }

        function getWgs84UtmDef(zone, isSouth) {
            return `+proj=utm +zone=${zone} ${isSouth ? '+south' : ''} +datum=WGS84 +units=m +no_defs`;
        }

        // UI Generator for Results (Matches React Component Design)
        function renderResultGroup(title, items) {
            let groupHtml = `
                <div class="space-y-2 mb-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                        <i data-lucide="chevron-right" class="w-3 h-3 text-amber-500"></i>
                        ${title}
                    </p>
                    <div class="space-y-1.5">
            `;

            items.forEach((item) => {
                const copyVal = item.value.replace(' m', ''); // Remove 'm' unit for copying
                currentResultText += `${item.label}: ${item.value}\n`;

                groupHtml += `
                    <div class="flex items-start justify-between gap-2 bg-background/60 rounded-md px-3 py-2.5 border border-border/50">
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] text-slate-400 mb-0.5 font-medium">${item.label}</p>
                            <p class="text-sm font-semibold truncate text-white">${item.value}</p>
                            ${item.dms ? `<p class="text-[10px] text-slate-400 mt-0.5 font-mono opacity-70">${item.dms}</p>` : ''}
                        </div>
                        <button onclick="copySingleResult(this, '${copyVal}')" class="flex-shrink-0 w-7 h-7 rounded flex items-center justify-center text-slate-400 hover:text-amber-500 hover:bg-amber-500/10 transition-colors mt-0.5" title="Copy">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
            });

            groupHtml += `</div></div>`;
            return groupHtml;
        }

        // --- Core Conversion Logic ---
        function convert() {
            try {
                const datumKey = document.getElementById('datumSelect').value;
                const datumName = document.getElementById('datumSelect').options[document.getElementById('datumSelect').selectedIndex].text.split('(')[0].trim();
                let localDef = DATUM_DEFS[datumKey];
                
                let wgsLat, wgsLon, locLat, locLon, locEasting, locNorthing, wgsEasting, wgsNorthing, zone, isSouth;

                // 1. Get Base Lat/Lon
                if (inputMode === 'latlon') {
                    const latVal = parseCoordinate(document.getElementById('lat').value);
                    const lonVal = parseCoordinate(document.getElementById('lon').value);
                    if (isNaN(latVal) || isNaN(lonVal)) throw new Error("กรุณากรอกพิกัดให้ถูกต้องตามฟอร์แมตที่เลือก");

                    if (direction === 'wgs84_to_local') {
                        wgsLat = latVal; wgsLon = lonVal;
                        if(localDef === 'AUTO') {
                            locLat = wgsLat; locLon = wgsLon;
                        } else {
                            // WGS84 to Local
                            const res = proj4(WGS84, localDef, [wgsLon, wgsLat]);
                            if (localDef.includes('+proj=utm')) {
                                locEasting = res[0]; locNorthing = res[1];
                                const geoRes = proj4(localDef, WGS84, [locEasting, locNorthing]); 
                                locLat = geoRes[1]; locLon = geoRes[0];
                            } else {
                                locLon = res[0]; locLat = res[1];
                            }
                        }
                    } else {
                        // Local to WGS84
                        locLat = latVal; locLon = lonVal;
                        if(localDef === 'AUTO') {
                            wgsLat = locLat; wgsLon = locLon;
                        } else {
                            const res = proj4(localDef, WGS84, [locLon, locLat]);
                            wgsLon = res[0]; wgsLat = res[1];
                        }
                    }
                } else {
                    // UTM Input
                    const eVal = parseFloat(document.getElementById('easting').value);
                    const nVal = parseFloat(document.getElementById('northing').value);
                    zone = parseInt(document.getElementById('zone').value);
                    const hemi = document.getElementById('hemi').value;
                    isSouth = hemi === 'S';
                    
                    if (isNaN(eVal) || isNaN(nVal) || isNaN(zone)) throw new Error("กรุณากรอกข้อมูลพิกัด UTM ให้ครบถ้วน");

                    if (direction === 'wgs84_to_local') {
                        wgsEasting = eVal; wgsNorthing = nVal;
                        const wgsUtmDef = getWgs84UtmDef(zone, isSouth);
                        const resGeo = proj4(wgsUtmDef, WGS84, [wgsEasting, wgsNorthing]);
                        wgsLon = resGeo[0]; wgsLat = resGeo[1];
                        
                        if(localDef !== 'AUTO') {
                            const resLoc = proj4(WGS84, localDef, [wgsLon, wgsLat]);
                            if (localDef.includes('+proj=utm')) {
                                locEasting = resLoc[0]; locNorthing = resLoc[1];
                            } else {
                                locLon = resLoc[0]; locLat = resLoc[1];
                            }
                        } else {
                            locLat = wgsLat; locLon = wgsLon;
                        }
                    } else {
                        locEasting = eVal; locNorthing = nVal;
                        let tempLocalUtmDef = localDef;
                        if (!localDef.includes('+proj=utm')) {
                             const ellpsMatch = localDef.match(/\+ellps=\S+/) || ['+datum=WGS84'];
                             const towgsMatch = localDef.match(/\+towgs84=[^\s]+/) || [''];
                             tempLocalUtmDef = `+proj=utm +zone=${zone} ${isSouth?'+south':''} ${ellpsMatch[0]} ${towgsMatch[0]} +units=m +no_defs`;
                        }
                        const resWgs = proj4(tempLocalUtmDef, WGS84, [locEasting, locNorthing]);
                        wgsLon = resWgs[0]; wgsLat = resWgs[1];
                    }
                }

                // 2. Compute missing UTMs
                if (!wgsEasting && wgsLat !== undefined && wgsLon !== undefined) {
                    zone = getUtmZone(wgsLon);
                    isSouth = wgsLat < 0;
                    const def = getWgs84UtmDef(zone, isSouth);
                    const res = proj4(WGS84, def, [wgsLon, wgsLat]);
                    wgsEasting = res[0]; wgsNorthing = res[1];
                }
                
                // Map update
                initMap(wgsLat, wgsLon);

                // 3. Render Results
                const resultDiv = document.getElementById('result-content');
                let html = '';
                currentResultText = "";

                if (direction === 'wgs84_to_local') {
                    if (locLat !== undefined && locLon !== undefined) {
                        html += renderResultGroup(`${datumName} Geographic`, [
                            { label: 'Latitude', value: formatCoord(locLat, true, coordFormat), dms: coordFormat === 'D' ? toDMS(locLat, true) : null },
                            { label: 'Longitude', value: formatCoord(locLon, false, coordFormat), dms: coordFormat === 'D' ? toDMS(locLon, false) : null }
                        ]);
                    }
                    if (locEasting !== undefined && locNorthing !== undefined) {
                        html += renderResultGroup(`${datumName} Projected / UTM`, [
                            { label: 'Easting (X)', value: locEasting.toFixed(3) + ' m' },
                            { label: 'Northing (Y)', value: locNorthing.toFixed(3) + ' m' }
                        ]);
                    }
                    if(localDef === 'AUTO' || wgsEasting) {
                        html += renderResultGroup(`WGS84 UTM — Zone ${zone}${isSouth?'S':'N'} (Reference)`, [
                            { label: 'Easting', value: wgsEasting.toFixed(3) + ' m' },
                            { label: 'Northing', value: wgsNorthing.toFixed(3) + ' m' }
                        ]);
                    }
                } else {
                    html += renderResultGroup('WGS84 Geographic (EPSG:4326)', [
                        { label: 'Latitude', value: formatCoord(wgsLat, true, coordFormat), dms: coordFormat === 'D' ? toDMS(wgsLat, true) : null },
                        { label: 'Longitude', value: formatCoord(wgsLon, false, coordFormat), dms: coordFormat === 'D' ? toDMS(wgsLon, false) : null }
                    ]);
                    html += renderResultGroup(`WGS84 UTM — Zone ${zone}${isSouth?'S':'N'}`, [
                        { label: 'Easting', value: wgsEasting.toFixed(3) + ' m' },
                        { label: 'Northing', value: wgsNorthing.toFixed(3) + ' m' }
                    ]);
                }

                resultDiv.innerHTML = html;
                lucide.createIcons(); // Re-render icons for new HTML
                document.getElementById('results').classList.remove('hidden');

            } catch (err) {
                alert("ข้อผิดพลาด: " + err.message);
            }
        }

        // --- Copy Functions ---
        function copySingleResult(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = btn.querySelector('i');
                icon.setAttribute('data-lucide', 'check-check');
                btn.classList.add('text-amber-500');
                lucide.createIcons();
                
                setTimeout(() => {
                    icon.setAttribute('data-lucide', 'copy');
                    btn.classList.remove('text-amber-500');
                    lucide.createIcons();
                }, 2000);
            });
        }

        function copyAllResults() {
            if(!currentResultText) return;
            navigator.clipboard.writeText(currentResultText).then(() => {
                alert("คัดลอกผลลัพธ์ทั้งหมดเรียบร้อยแล้ว!");
            });
        }
    </script>
</body>
</html>
