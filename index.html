<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoordConverter - แปลงพิกัด</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f59e0b', // Amber-500
                        background: '#0f172a', // Slate-900
                        card: '#1e293b', // Slate-800
                        border: '#334155' // Slate-700
                    }
                }
            }
        }
    </script>

    <!-- Leaflet Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Proj4js สำหรับแปลงพิกัด -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Styles */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .grid-bg {
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark body { background-color: #0f172a; color: #f8fafc; }
        .light body { background-color: #f8fafc; color: #0f172a; }
        .light .grid-bg {
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
        .light .bg-card { background-color: #ffffff; border-color: #e2e8f0; }
        .light .border-border { border-color: #e2e8f0; }
        .light input, .light select { background-color: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }
        
        input, select { outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #f59e0b; }
        
        #map { height: 300px; z-index: 1; border-radius: 0.5rem; }
        .dark #map { filter: brightness(0.9) contrast(1.1); }
    </style>
</head>
<body class="grid-bg min-h-screen flex flex-col transition-colors duration-200">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-slate-900/90 dark:bg-slate-900/90 light:bg-white/90 backdrop-blur-sm border-b border-border transition-colors">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded bg-amber-500/20 border border-amber-500/50 flex items-center justify-center">
                    <i data-lucide="crosshair" class="w-4 h-4 text-amber-500"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold leading-none">CoordConverter</h1>
                    <p class="text-[10px] text-slate-400 mt-0.5">WGS84 ↔ Local Datum</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="getGPS()" class="p-2 text-slate-400 hover:text-amber-500 transition-colors" title="GPS">
                    <i data-lucide="navigation" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleTheme()" class="p-2 text-slate-400 hover:text-amber-500 transition-colors" title="สลับธีม">
                    <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-lg mx-auto w-full px-4 py-6 space-y-4">

        <!-- Datum Selector -->
        <section class="bg-card border border-border rounded-xl p-4 shadow-sm">
            <label class="flex items-center gap-1.5 text-xs font-semibold text-slate-400 uppercase mb-2">
                <i data-lucide="globe" class="w-3.5 h-3.5 text-amber-500"></i> Local Datum / ระบบพิกัด
            </label>
            <select id="datumSelect" class="w-full bg-slate-800 text-sm border border-border rounded-lg px-3 py-2 text-white">
                <option value="indian1975">Indian 1975 (Thailand) - EPSG:4240</option>
                <option value="indian1975_utm47">Indian 1975 UTM 47N - EPSG:24047</option>
                <option value="indian1975_utm48">Indian 1975 UTM 48N - EPSG:24048</option>
                <option value="wgs84_utm_auto" selected>WGS84 UTM (Auto Zone)</option>
                <option value="nad83">NAD83 (North America) - EPSG:4269</option>
                <option value="etrs89">ETRS89 (Europe) - EPSG:4258</option>
            </select>
        </section>

        <!-- Direction & Input Mode -->
        <div class="flex gap-2">
            <button onclick="swapDirection()" class="flex-1 flex items-center justify-center gap-2 bg-card border border-border rounded-lg py-2 text-xs font-semibold hover:border-amber-500 transition-colors">
                <span id="label-from" class="text-amber-500">WGS84</span>
                <i data-lucide="arrow-left-right" class="w-3 h-3"></i>
                <span id="label-to">Local</span>
            </button>
            <div class="flex bg-card border border-border rounded-lg overflow-hidden">
                <button id="btn-mode-latlon" onclick="setInputMode('latlon')" class="px-4 py-2 text-xs font-bold bg-amber-500 text-slate-900 transition-colors">Lat/Lon</button>
                <button id="btn-mode-utm" onclick="setInputMode('utm')" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-colors">UTM</button>
            </div>
        </div>

        <!-- Input Fields -->
        <section class="bg-card border border-border rounded-xl p-4 shadow-sm space-y-3">
            <h3 id="input-title" class="text-xs font-bold text-amber-500 uppercase flex items-center gap-1.5">
                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> WGS84 Input
            </h3>
            
            <!-- Lat/Lon Inputs -->
            <div id="inputs-latlon" class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] text-slate-400 uppercase">Latitude</label>
                    <input type="number" id="lat" placeholder="13.7563" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase">Longitude</label>
                    <input type="number" id="lon" placeholder="100.5018" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                </div>
            </div>

            <!-- UTM Inputs (Hidden by default) -->
            <div id="inputs-utm" class="hidden space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Easting (X)</label>
                        <input type="number" id="easting" placeholder="662500" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Northing (Y)</label>
                        <input type="number" id="northing" placeholder="1521500" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Zone (1-60)</label>
                        <input type="number" id="zone" placeholder="47" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Hemisphere</label>
                        <select id="hemi" class="w-full bg-slate-900/50 border border-border rounded-md px-3 py-2 text-sm mt-1 text-white">
                            <option value="N">North (N)</option>
                            <option value="S">South (S)</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- Convert Button -->
        <button onclick="convert()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2">
            <i data-lucide="zap" class="w-4 h-4"></i> แปลงพิกัด (Convert)
        </button>

        <!-- Map Container -->
        <div id="map" class="shadow-sm border border-border hidden"></div>

        <!-- Results Area -->
        <section id="results" class="hidden bg-card border border-amber-500/30 rounded-xl p-4 shadow-[0_0_15px_rgba(245,158,11,0.1)] space-y-4">
            <div class="flex items-center justify-between border-b border-border pb-2">
                <h3 id="output-title" class="text-xs font-bold text-amber-500 uppercase">Local Output</h3>
                <button onclick="copyResults()" class="text-xs flex items-center gap-1 text-slate-400 hover:text-white">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy
                </button>
            </div>
            
            <div id="result-content" class="space-y-3">
                <!-- Results will be injected here via JS -->
            </div>
        </section>

    </main>

    <!-- App Logic -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        // State variables
        let isDark = true;
        let direction = 'wgs84_to_local'; // 'wgs84_to_local' or 'local_to_wgs84'
        let inputMode = 'latlon'; // 'latlon' or 'utm'
        let map = null;
        let marker = null;
        let currentResultText = "";

        // Datum Definitions (Proj4 strings)
        const WGS84 = "+proj=longlat +datum=WGS84 +no_defs";
        const DATUM_DEFS = {
            'wgs84_utm_auto': 'AUTO',
            'indian1975': "+proj=longlat +a=6377276.345 +b=6356075.41314024 +towgs84=214,836,303,0,0,0,0 +no_defs",
            'indian1975_utm47': "+proj=utm +zone=47 +a=6377276.345 +b=6356075.41314024 +towgs84=214,836,303,0,0,0,0 +units=m +no_defs",
            'indian1975_utm48': "+proj=utm +zone=48 +a=6377276.345 +b=6356075.41314024 +towgs84=214,836,303,0,0,0,0 +units=m +no_defs",
            'nad83': "+proj=longlat +datum=NAD83 +no_defs",
            'etrs89': "+proj=longlat +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +no_defs"
        };

        // UI Functions
        function toggleTheme() {
            isDark = !isDark;
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (isDark) {
                html.classList.add('dark');
                html.classList.remove('light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.setAttribute('data-lucide', 'sun');
                
                // Update inputs for light mode styling
                document.querySelectorAll('input, select').forEach(el => {
                    el.classList.replace('text-white', 'text-slate-900');
                });
            }
            lucide.createIcons();
        }

        function swapDirection() {
            direction = direction === 'wgs84_to_local' ? 'local_to_wgs84' : 'wgs84_to_local';
            document.getElementById('label-from').innerText = direction === 'wgs84_to_local' ? 'WGS84' : 'Local';
            document.getElementById('label-to').innerText = direction === 'wgs84_to_local' ? 'Local' : 'WGS84';
            
            document.getElementById('input-title').innerHTML = `<i data-lucide="map-pin" class="w-3.5 h-3.5 inline"></i> ${direction === 'wgs84_to_local' ? 'WGS84 Input' : 'Local Input'}`;
            document.getElementById('output-title').innerText = direction === 'wgs84_to_local' ? 'Local Output' : 'WGS84 Output';
            
            lucide.createIcons();
            clearResults();
        }

        function setInputMode(mode) {
            inputMode = mode;
            const btnLatLon = document.getElementById('btn-mode-latlon');
            const btnUtm = document.getElementById('btn-mode-utm');
            
            if (mode === 'latlon') {
                document.getElementById('inputs-latlon').classList.remove('hidden');
                document.getElementById('inputs-utm').classList.add('hidden');
                
                btnLatLon.className = "px-4 py-2 text-xs font-bold bg-amber-500 text-slate-900 transition-colors";
                btnUtm.className = "px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-colors bg-transparent";
            } else {
                document.getElementById('inputs-latlon').classList.add('hidden');
                document.getElementById('inputs-utm').classList.remove('hidden');
                
                btnUtm.className = "px-4 py-2 text-xs font-bold bg-amber-500 text-slate-900 transition-colors";
                btnLatLon.className = "px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition-colors bg-transparent";
            }
            clearResults();
        }

        function clearResults() {
            document.getElementById('results').classList.add('hidden');
            currentResultText = "";
        }

        // Map Functions
        function initMap(lat, lon) {
            document.getElementById('map').classList.remove('hidden');
            
            if (!map) {
                map = L.map('map').setView([lat, lon], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                
                marker = L.marker([lat, lon]).addTo(map);
            } else {
                map.setView([lat, lon], 12);
                marker.setLatLng([lat, lon]);
            }
        }

        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    document.getElementById('lat').value = lat.toFixed(6);
                    document.getElementById('lon').value = lon.toFixed(6);
                    
                    if(direction !== 'wgs84_to_local') swapDirection();
                    if(inputMode !== 'latlon') setInputMode('latlon');
                    
                    initMap(lat, lon);
                    alert(`GPS Location found: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
                }, () => {
                    alert("Unable to retrieve your location.");
                });
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        // Core Math Functions
        function getUtmZone(lon) {
            return Math.floor((lon + 180) / 6) + 1;
        }

        function getWgs84UtmDef(zone, isSouth) {
            return `+proj=utm +zone=${zone} ${isSouth ? '+south' : ''} +datum=WGS84 +units=m +no_defs`;
        }

        function formatDMS(decimal, isLat) {
            const abs = Math.abs(decimal);
            const d = Math.floor(abs);
            const mFloat = (abs - d) * 60;
            const m = Math.floor(mFloat);
            const s = ((mFloat - m) * 60).toFixed(2);
            const dir = isLat ? (decimal >= 0 ? 'N' : 'S') : (decimal >= 0 ? 'E' : 'W');
            return `${d}° ${m}' ${s}" ${dir}`;
        }

        // Main Conversion Logic
        function convert() {
            try {
                const datumKey = document.getElementById('datumSelect').value;
                let localDef = DATUM_DEFS[datumKey];
                
                let wgsLat, wgsLon, locLat, locLon, locEasting, locNorthing, wgsEasting, wgsNorthing, zone, isSouth;

                // 1. Get Base Lat/Lon
                if (inputMode === 'latlon') {
                    const latVal = parseFloat(document.getElementById('lat').value);
                    const lonVal = parseFloat(document.getElementById('lon').value);
                    if (isNaN(latVal) || isNaN(lonVal)) throw new Error("กรุณากรอกพิกัดให้ถูกต้อง");

                    if (direction === 'wgs84_to_local') {
                        wgsLat = latVal; wgsLon = lonVal;
                        if(localDef === 'AUTO') {
                            locLat = wgsLat; locLon = wgsLon;
                        } else {
                            // WGS84 to Local
                            const res = proj4(WGS84, localDef, [wgsLon, wgsLat]);
                            if (localDef.includes('+proj=utm')) {
                                locEasting = res[0]; locNorthing = res[1];
                                const geoRes = proj4(localDef, WGS84, [locEasting, locNorthing]); // Approximation for display
                                locLat = geoRes[1]; locLon = geoRes[0];
                            } else {
                                locLon = res[0]; locLat = res[1];
                            }
                        }
                    } else {
                        // Local to WGS84
                        locLat = latVal; locLon = lonVal;
                        if(localDef === 'AUTO') {
                            wgsLat = locLat; wgsLon = locLon;
                        } else {
                            const res = proj4(localDef, WGS84, [locLon, locLat]);
                            wgsLon = res[0]; wgsLat = res[1];
                        }
                    }
                } else {
                    // UTM Input
                    const eVal = parseFloat(document.getElementById('easting').value);
                    const nVal = parseFloat(document.getElementById('northing').value);
                    zone = parseInt(document.getElementById('zone').value);
                    const hemi = document.getElementById('hemi').value;
                    isSouth = hemi === 'S';
                    
                    if (isNaN(eVal) || isNaN(nVal) || isNaN(zone)) throw new Error("กรุณากรอก UTM ให้ครบถ้วน");

                    if (direction === 'wgs84_to_local') {
                        wgsEasting = eVal; wgsNorthing = nVal;
                        const wgsUtmDef = getWgs84UtmDef(zone, isSouth);
                        const resGeo = proj4(wgsUtmDef, WGS84, [wgsEasting, wgsNorthing]);
                        wgsLon = resGeo[0]; wgsLat = resGeo[1];
                        
                        if(localDef !== 'AUTO') {
                            const resLoc = proj4(WGS84, localDef, [wgsLon, wgsLat]);
                            if (localDef.includes('+proj=utm')) {
                                locEasting = resLoc[0]; locNorthing = resLoc[1];
                            } else {
                                locLon = resLoc[0]; locLat = resLoc[1];
                            }
                        } else {
                            locLat = wgsLat; locLon = wgsLon;
                        }
                    } else {
                        locEasting = eVal; locNorthing = nVal;
                        // Local UTM to WGS84 requires knowing if local is projected or not.
                        // For simplicity in this vanilla version, we build a local UTM string if needed
                        let tempLocalUtmDef = localDef;
                        if (!localDef.includes('+proj=utm')) {
                             const ellpsMatch = localDef.match(/\+ellps=\S+/) || ['+datum=WGS84'];
                             const towgsMatch = localDef.match(/\+towgs84=[^\s]+/) || [''];
                             tempLocalUtmDef = `+proj=utm +zone=${zone} ${isSouth?'+south':''} ${ellpsMatch[0]} ${towgsMatch[0]} +units=m +no_defs`;
                        }
                        const resWgs = proj4(tempLocalUtmDef, WGS84, [locEasting, locNorthing]);
                        wgsLon = resWgs[0]; wgsLat = resWgs[1];
                    }
                }

                // 2. Compute missing UTMs
                if (!wgsEasting && wgsLat && wgsLon) {
                    zone = getUtmZone(wgsLon);
                    isSouth = wgsLat < 0;
                    const def = getWgs84UtmDef(zone, isSouth);
                    const res = proj4(WGS84, def, [wgsLon, wgsLat]);
                    wgsEasting = res[0]; wgsNorthing = res[1];
                }
                
                // Map update (Always use WGS84 for Leaflet map)
                initMap(wgsLat, wgsLon);

                // 3. Render Results
                const resultDiv = document.getElementById('result-content');
                let html = '';
                currentResultText = "";

                const addLine = (label, val, sub = null) => {
                    currentResultText += `${label}: ${val}\n`;
                    html += `
                        <div class="bg-slate-900/40 p-2.5 rounded-lg border border-border flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-slate-400 font-semibold">${label}</p>
                                <p class="text-sm font-mono text-white">${val}</p>
                                ${sub ? `<p class="text-[9px] text-slate-500 font-mono mt-0.5">${sub}</p>` : ''}
                            </div>
                        </div>
                    `;
                };

                if (direction === 'wgs84_to_local') {
                    if (locLat && locLon && !locEasting) {
                        addLine('Local Latitude', locLat.toFixed(6), formatDMS(locLat, true));
                        addLine('Local Longitude', locLon.toFixed(6), formatDMS(locLon, false));
                    }
                    if (locEasting && locNorthing) {
                        addLine('Local Easting (X)', locEasting.toFixed(3) + ' m');
                        addLine('Local Northing (Y)', locNorthing.toFixed(3) + ' m');
                    }
                    if(localDef === 'AUTO') {
                        addLine('WGS84 UTM Zone', `${zone} ${isSouth ? 'S' : 'N'}`);
                        addLine('Local Easting (X)', wgsEasting.toFixed(3) + ' m');
                        addLine('Local Northing (Y)', wgsNorthing.toFixed(3) + ' m');
                    }
                } else {
                    addLine('WGS84 Latitude', wgsLat.toFixed(6), formatDMS(wgsLat, true));
                    addLine('WGS84 Longitude', wgsLon.toFixed(6), formatDMS(wgsLon, false));
                    addLine('WGS84 UTM Zone', `${zone} ${isSouth ? 'S' : 'N'}`);
                    addLine('WGS84 Easting', wgsEasting.toFixed(3) + ' m');
                    addLine('WGS84 Northing', wgsNorthing.toFixed(3) + ' m');
                }

                resultDiv.innerHTML = html;
                document.getElementById('results').classList.remove('hidden');

            } catch (err) {
                alert("ข้อผิดพลาด: " + err.message);
            }
        }

        function copyResults() {
            if(!currentResultText) return;
            navigator.clipboard.writeText(currentResultText).then(() => {
                alert("คัดลอกผลลัพธ์แล้ว!");
            });
        }
    </script>
</body>
</html>
